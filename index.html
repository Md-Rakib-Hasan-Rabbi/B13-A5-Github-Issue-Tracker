<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- daisyUI + Tailwind CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="flex min-h-screen items-center justify-center">
        <div class="flex flex-col w-3/12 shadow-2xl mx-auto items-center justify-center">
            <div class="mt-6">
                <div class="image flex justify-center">
                    <img src="./assets/github-logo.png" alt="GitHub Logo">
                </div>
                
                <h2 class="text-xl font-semibold text-center mb-1 mt-3">GitHub Issues Tracker</h2>
                <p class="text-gray-600 text-center mb-6">Sign in to manage your issues</p>
            </div>

            <div class="form-control mb-3">
                <label class="label">
                    <span class="label-text">Username</span>
                </label>
                <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full" />
            </div>
            <div class="form-control mb-5">
                <label class="label">
                    <span class="label-text">Password</span>
                </label>
                <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full" />
            </div>
            <button id="sign-in-btn" class="btn w-8/12 btn-primary mb-[44px]">
                Sign In
            </button>
        </div>
    </div>


</body>
    <script src="./scripts/index.js"></script>
</html>
