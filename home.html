<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- daisyUI + Tailwind CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

    <!-- custom css -->
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm space-x-3">
            <div class="flex flex-1 items-center gap-2">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-8" />
                <a class="btn btn-ghost normal-case text-xl">Github Issue Tracker</a>
            </div>
            <label class="input input-bordered flex items-center gap-2 w-68">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <input type="text" id="search-input" class="grow" placeholder="Search issues..." />
            </label>
            <div>
                <button id="search-btn" class="btn btn-primary">
                    Search
                </button>
            </div>
        </div>
    </header>

    <section>
        <div class="w-11/12 mx-auto mt-6 p-6 rounded-lg shadow-md flex gap-4">
            <button onclick="loadIssues()" class="btn btn-outline btn-primary w-20" id="all-btn">
                All
            </button>
            <button class="btn btn-outline btn-primary w-20" id="open-btn">
                Open
            </button>
            <button class="btn btn-outline btn-primary w-20" id="closed-btn">
                Closed
            </button>
        </div>

        <div class="w-11/12 mx-auto mt-6 p-6 rounded-lg shadow-md flex gap-4 justify-between">
            <div class="flex gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="Aperture Science" />
                </div>
                <div>
                    <h2 class="text-xl font-semibold" id="issue-count">0 Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex justify-center items-center gap-2">
                <div>
                    <i class="fa-solid fa-circle text-[10px] text-emerald-500"></i>
                    <span class="ml-2">Open</span>
                </div>
                <div>
                    <i class="fa-solid fa-circle text-purple-500 text-[10px]"></i>
                    <span class="ml-2">Closed</span>
                </div>
            </div>
        </div>
    </section>

    <section class="w-11/12 mx-auto mt-2">
        <div id="IssuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </section>

    <dialog id="loadSingleIssue" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box p-8 border-2 border-blue-500 rounded-xl max-w-2xl w-full">
            <h2 id="modal-title" class="text-3xl font-bold mb-2"></h2>
            <div class="flex items-center gap-2 mb-2">
                <span id="modal-status" class="px-3 py-1 rounded-full text-xs font-bold"></span>
                <span class="text-gray-400 text-xs">•</span>
                <span id="modal-author" class="text-gray-500 text-xs"></span>
                <span class="text-gray-400 text-xs">•</span>
                <span id="modal-date" class="text-gray-500 text-xs"></span>
            </div>
            <div id="modal-labels" class="flex gap-2 mb-4"></div>
            <p id="modal-desc" class="mb-6 text-gray-700"></p>
            <div class="bg-gray-50 rounded-lg p-4 flex justify-between items-center mb-6">
                <div>
                    <span class="text-gray-500 text-sm">Assignee:</span>
                    <span id="modal-assignee" class="font-bold"></span>
                </div>
                <div>
                    <span class="text-gray-500 text-sm">Priority:</span>
                    <span id="modal-priority" class="ml-2 px-3 py-1 rounded-full text-xs font-bold"></span>
                </div>
            </div>
            <div class="flex justify-end">
                <form method="dialog">
                    <button class="btn bg-blue-700 text-white px-8">Close</button>
                </form>
            </div>
        </div>
    </dialog>
</body>
<script src="./scripts/home.js"></script>

</html>
