<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>

    <!-- daisyUI + Tailwind CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

    <!-- custom css -->
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm space-x-3">
            <div class="flex flex-1 items-center gap-2">
                <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-8" />
                <a class="btn btn-ghost normal-case text-xl">Github Issue Tracker</a>
            </div>
            <label class="input input-bordered flex items-center gap-2 w-68">
                <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                <input type="text" class="grow" placeholder="Search issues..." />
            </label>
            <div>
                <button class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> New Issue
                </button>
            </div>
        </div>
    </header>

    <section>
        <div class="w-11/12 mx-auto mt-6 p-6 rounded-lg shadow-md flex gap-4">
            <button class="btn btn-outline btn-primary w-20">All</button>
            <button class="btn btn-outline btn-primary w-20">Open</button>
            <button class="btn btn-outline btn-primary w-20">Closed</button>
        </div>

        <div class="w-11/12 mx-auto mt-6 p-6 rounded-lg shadow-md flex gap-4 justify-between">
            <div class="flex gap-2">
                <div>
                    <img src="./assets/Aperture.png" alt="Aperture Science" />
                </div>
                <div>
                    <h2 class="text-xl font-semibold">50 Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex justify-center items-center">
                <div>
                    <i class="fa-solid fa-circle text-[10px] text-emerald-500"></i>
                    <span class="ml-2">Open</span>
                </div>
                <div>
                    <i class="fa-solid fa-circle text-purple-500 text-[10px]"></i>
                    <span class="ml-2">Closed</span>
                </div>
            </div>
        </div>
    </section>
    
</body>

</html>
